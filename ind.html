<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Fusion JSON</title>
<style>
body{
    font-family:Arial,sans-serif;
    max-width:800px;
    margin:40px auto;
}
button{
    padding:10px 20px;
}
pre{
    background:#f5f5f5;
    padding:10px;
    max-height:300px;
    overflow:auto;
}
</style>
</head>
<body>

<h2>Fusionner en un seul JSON</h2>

<input type="file" id="fileInput" accept=".txt,.json">

<p id="info"></p>

<button id="downloadBtn" disabled>Télécharger le JSON</button>

<pre id="preview"></pre>

<script>

let finalData = [];

document.getElementById("fileInput").addEventListener("change", e => {

    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = () => {

        const text = reader.result;

        try {

            // JSON normal
            const parsed = JSON.parse(text);

            if (Array.isArray(parsed)) {
                finalData = parsed;
            } else {
                finalData = [parsed];
            }

        } catch {

            // Plusieurs tableaux JSON collés
            finalData = [];

            const arrays = text.match(/\[[\s\S]*?\]/g);

            if (!arrays) {
                alert("Impossible de trouver du JSON valide.");
                return;
            }

            for (const arr of arrays) {
                try {
                    const parsed = JSON.parse(arr);

                    if (Array.isArray(parsed)) {
                        finalData.push(...parsed);
                    } else {
                        finalData.push(parsed);
                    }

                } catch {}
            }
        }

        document.getElementById("info").innerHTML =
            "Objets trouvés : <b>" + finalData.length + "</b>";

        document.getElementById("preview").textContent =
            JSON.stringify(finalData.slice(0,3), null, 2);

        document.getElementById("downloadBtn").disabled = false;
    };

    reader.readAsText(file);
});

document.getElementById("downloadBtn").addEventListener("click", () => {

    const blob = new Blob(
        [JSON.stringify(finalData, null, 2)],
        {type:"application/json"}
    );

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "vocabulaire_complet.json";
    a.click();

    URL.revokeObjectURL(url);
});

</script>

</body>
</html>
