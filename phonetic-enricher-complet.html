<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Phonetic Enricher Multi Lots</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
body{font-family:Arial,sans-serif;max-width:1000px;margin:auto;padding:20px}
.box{border:1px solid #ddd;padding:15px;border-radius:10px;margin-bottom:15px}
.progress{height:24px;background:#eee;border-radius:20px;overflow:hidden}
.bar{height:100%;width:0;background:#4caf50}
#log{height:250px;overflow:auto;border:1px solid #ddd;padding:10px;font-size:12px}
button{padding:10px 15px}
</style>
</head>
<body>

<h1>Phonetic Enricher Multi-Lots</h1>

<div class="box">
<input type="file" id="fileInput" accept=".json" multiple>
</div>

<div class="box">
<label>Délai (ms)</label>
<input type="number" id="delay" value="50">
<button onclick="startEnrichment()">Lancer</button>
</div>

<div class="box">
<div class="progress"><div class="bar" id="bar"></div></div>
<p id="status">0%</p>
</div>

<div class="box">
<div id="log"></div>
</div>

<script>
let allFiles=[];
let allResults=[];
const cache={};

document.getElementById("fileInput").addEventListener("change",async e=>{
 allFiles=[];
 for(const file of e.target.files){
   const txt=await file.text();
   allFiles.push({
      name:file.name,
      data:JSON.parse(txt)
   });
 }
 log("Fichiers chargés : "+allFiles.length);
});

function log(t){
 document.getElementById("log").innerHTML+=t+"<br>";
}

async function fetchIPA(word){
 if(!word)return null;

 const key=word.toLowerCase();

 if(cache[key]!==undefined)return cache[key];

 try{
   const r=await fetch(
    "https://dictionary-api-7hmy.onrender.com/define?word="+encodeURIComponent(word)
   );

   if(!r.ok){
      cache[key]=null;
      return null;
   }

   const d=await r.json();

   let ipa=null;

   if(Array.isArray(d?.phonetics)&&d.phonetics.length){
      ipa=d.phonetics.find(x=>x.text)?.text||null;
   }

   cache[key]=ipa;
   return ipa;

 }catch(e){
   cache[key]=null;
   return null;
 }
}

function rebuild(item,ipa){

 const out={};

 if("id" in item) out.id=item.id;
 if("word" in item) out.word=item.word;

 out.phonetic=ipa;

 if("level" in item) out.level=item.level;
 if("translation" in item) out.translation=item.translation;
 if("exampleEnglish" in item) out.exampleEnglish=item.exampleEnglish;
 if("exampleFrench" in item) out.exampleFrench=item.exampleFrench;

 for(const k in item){
   if(!(k in out)){
      out[k]=item[k];
   }
 }

 return out;
}

async function startEnrichment(){

 if(!allFiles.length){
   alert("Charge les fichiers JSON");
   return;
 }

 allResults=[];

 let total=0;
 allFiles.forEach(f=>total+=f.data.length);

 let done=0;

 const delay=parseInt(document.getElementById("delay").value)||50;

 for(const file of allFiles){

   const enriched=[];

   for(const item of file.data){

      const ipa=await fetchIPA(item.word||"");

      enriched.push(
        rebuild(item,ipa)
      );

      done++;

      const pct=Math.round(done*100/total);

      document.getElementById("bar").style.width=pct+"%";
      document.getElementById("status").textContent=done+" / "+total+" ("+pct+"%)";

      if(done%25===0){
         log(done+" / "+total);
      }

      if(delay>0){
        await new Promise(r=>setTimeout(r,delay));
      }
   }

   allResults.push({
      name:file.name,
      data:enriched
   });
 }

 const zip=new JSZip();

 for(const f of allResults){
   zip.file(
     f.name,
     JSON.stringify(f.data,null,2)
   );
 }

 const blob=await zip.generateAsync({type:"blob"});

 const a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="dictionary_all_phonetics.zip";
 a.click();

 log("ZIP généré");
}
</script>
</body>
</html>
