<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROCKET — Space Division</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --white: #e8eaf0;
    --dim: rgba(232,234,240,0.55);
    --faint: rgba(232,234,240,0.25);
    --bg-top: #0a0c14;
    --bg-bot: #060810;
    --accent: #4fc3f7;
    --glow: rgba(79,195,247,0.18);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg-top);
    font-family: 'Share Tech Mono', monospace;
    color: var(--white);
    user-select: none;
  }

  /* ── STARFIELD ── */
  #stars {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
    opacity: var(--o, 0.6);
  }
  @keyframes twinkle {
    from { opacity: var(--o, 0.6); transform: scale(1); }
    to   { opacity: calc(var(--o, 0.6) * 0.3); transform: scale(0.7); }
  }

  /* ── NEBULA ── */
  #nebula {
    position: fixed; inset: 0; z-index: 1;
    background:
      radial-gradient(ellipse 60% 40% at 20% 30%, rgba(79,195,247,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 70%, rgba(100,80,200,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 80% 80% at 50% 50%, rgba(6,8,16,0.0) 0%, var(--bg-bot) 100%);
    pointer-events: none;
  }

  /* ── LAYOUT ── */
  #scene {
    position: fixed; inset: 0; z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    perspective: 900px;
  }

  /* ── ROCKET WRAPPER ── */
  #rocket-wrap {
    position: relative;
    width: 220px;
    transform-style: preserve-3d;
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0px) rotateX(4deg) rotateY(-8deg); }
    50%      { transform: translateY(-18px) rotateX(-2deg) rotateY(8deg); }
  }

  /* ── ROCKET SVG SEGMENTS ── */
  #rocket-svg {
    width: 100%;
    filter: drop-shadow(0 0 28px rgba(79,195,247,0.5))
            drop-shadow(0 0 60px rgba(79,195,247,0.2));
  }

  /* Each segment gets its own decompose animation */
  .seg {
    transform-origin: center center;
    animation: decompose 7s ease-in-out infinite;
    fill: none;
  }
  .seg-body    { animation-delay: 0s; }
  .seg-nose    { animation-delay: 0.15s; }
  .seg-fin-l   { animation-delay: 0.3s; }
  .seg-fin-r   { animation-delay: 0.45s; }
  .seg-engine  { animation-delay: 0.6s; }
  .seg-window  { animation-delay: 0.75s; }
  .seg-stripe  { animation-delay: 0.9s; }

  @keyframes decompose {
    0%   { transform: translate(0, 0) rotate(0deg); opacity: 1; }
    10%  { transform: translate(0, 0) rotate(0deg); opacity: 1; }
    30%  { transform: translate(var(--dx,8px), var(--dy,-12px)) rotate(var(--dr,3deg)); opacity: 0.85; }
    50%  { transform: translate(calc(var(--dx,8px)*1.6), calc(var(--dy,-12px)*1.6)) rotate(calc(var(--dr,3deg)*2)); opacity: 0.6; }
    70%  { transform: translate(var(--dx,8px), var(--dy,-12px)) rotate(var(--dr,3deg)); opacity: 0.85; }
    90%  { transform: translate(0,0) rotate(0deg); opacity: 1; }
    100% { transform: translate(0,0) rotate(0deg); opacity: 1; }
  }

  .seg-nose   { --dx: 0px;   --dy: -20px; --dr: 0deg; }
  .seg-body   { --dx: 5px;   --dy: 4px;   --dr: 1deg; }
  .seg-fin-l  { --dx: -18px; --dy: 14px;  --dr: -6deg; }
  .seg-fin-r  { --dx: 18px;  --dy: 14px;  --dr: 6deg; }
  .seg-engine { --dx: 0px;   --dy: 22px;  --dr: 0deg; }
  .seg-window { --dx: 8px;   --dy: -8px;  --dr: 2deg; }
  .seg-stripe { --dx: -6px;  --dy: 6px;   --dr: -1deg; }

  /* Rocket flame */
  #flame-wrap {
    position: absolute;
    bottom: -48px;
    left: 50%;
    transform: translateX(-50%);
    width: 56px;
    pointer-events: none;
  }
  .flame {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    border-radius: 50% 50% 60% 60%;
    animation: burn 0.12s ease-in-out infinite alternate;
    transform-origin: top center;
  }
  .flame-outer {
    width: 56px; height: 80px;
    background: radial-gradient(ellipse at 50% 0%, #4fc3f7 0%, #0288d1 30%, transparent 75%);
    opacity: 0.9;
    top: 0;
  }
  .flame-mid {
    width: 34px; height: 56px;
    background: radial-gradient(ellipse at 50% 0%, #e0f7fa 0%, #4fc3f7 40%, transparent 75%);
    opacity: 0.95;
    top: 4px;
  }
  .flame-inner {
    width: 14px; height: 28px;
    background: radial-gradient(ellipse at 50% 0%, #ffffff 0%, #b3e5fc 60%, transparent 80%);
    top: 10px;
  }
  @keyframes burn {
    from { transform: translateX(-50%) scaleY(1) scaleX(1); }
    to   { transform: translateX(-50%) scaleY(0.88) scaleX(1.07); }
  }

  /* Particle exhaust */
  .particle {
    position: absolute;
    left: 50%;
    top: 10px;
    border-radius: 50%;
    background: var(--accent);
    pointer-events: none;
    animation: exhaust var(--pd, 1.2s) ease-out infinite;
    animation-delay: var(--pdelay, 0s);
    width: var(--ps, 4px);
    height: var(--ps, 4px);
    opacity: 0;
  }
  @keyframes exhaust {
    0%   { transform: translateX(-50%) translateY(0) scaleX(1); opacity: 0.9; }
    100% { transform: translateX(calc(-50% + var(--px, 0px))) translateY(var(--py, 80px)) scaleX(0.4); opacity: 0; }
  }

  /* ── UI OVERLAY ── */
  #ui {
    position: fixed; inset: 0; z-index: 10;
    pointer-events: none;
    padding: 32px 28px;
  }

  /* top-left: brand */
  #brand {
    position: absolute;
    top: 32px; left: 28px;
  }
  #brand .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(36px, 8vw, 54px);
    letter-spacing: -1px;
    line-height: 1;
    color: var(--white);
    text-transform: lowercase;
  }
  #brand .sub {
    margin-top: 10px;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.08em;
  }

  /* top-right: manifesto */
  #manifesto {
    position: absolute;
    top: 32px; right: 28px;
    text-align: right;
    max-width: 220px;
  }
  #manifesto .eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--dim);
    margin-bottom: 10px;
  }
  #manifesto p {
    font-size: 12px;
    line-height: 1.75;
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
  }

  /* bottom-left: sound toggle */
  #sound-btn {
    position: absolute;
    bottom: 32px; left: 28px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--dim);
    cursor: pointer;
    pointer-events: all;
    transition: color 0.2s;
    background: none; border: none;
  }
  #sound-btn:hover { color: var(--white); }
  #sound-icon { font-size: 16px; }

  /* bottom-right: coordinates */
  #coords {
    position: absolute;
    bottom: 32px; right: 28px;
    text-align: right;
    font-size: 10px;
    color: var(--faint);
    letter-spacing: 0.1em;
    line-height: 1.8;
  }

  /* scan line */
  #scan {
    position: fixed; inset: 0; z-index: 15;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.06) 2px,
      rgba(0,0,0,0.06) 4px
    );
    opacity: 0.4;
  }

  /* ── LOADING / INTRO ── */
  #intro {
    position: fixed; inset: 0; z-index: 50;
    background: var(--bg-top);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    transition: opacity 0.8s ease;
  }
  #intro.hide { opacity: 0; pointer-events: none; }
  .bar-wrap {
    width: 200px;
    height: 2px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.05s linear;
  }
  #intro-label {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--dim);
  }
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div id="intro-label">INITIALIZING LAUNCH SEQUENCE</div>
  <div class="bar-wrap"><div class="bar-fill" id="bar"></div></div>
</div>

<!-- STARS -->
<div id="stars"></div>
<div id="nebula"></div>

<!-- SCENE -->
<div id="scene">
  <div id="rocket-wrap">

    <!-- SVG ROCKET with segmented pieces -->
    <svg id="rocket-svg" viewBox="0 0 200 420" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Body gradient -->
        <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#b0bec5"/>
          <stop offset="35%"  stop-color="#eceff1"/>
          <stop offset="65%"  stop-color="#eceff1"/>
          <stop offset="100%" stop-color="#78909c"/>
        </linearGradient>
        <!-- Nose gradient -->
        <linearGradient id="noseGrad" x1="0%" y1="100%" x2="0%" y2="0%">
          <stop offset="0%"   stop-color="#90a4ae"/>
          <stop offset="100%" stop-color="#eceff1"/>
        </linearGradient>
        <!-- Dark panel -->
        <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#263238"/>
          <stop offset="50%"  stop-color="#37474f"/>
          <stop offset="100%" stop-color="#263238"/>
        </linearGradient>
        <!-- Fin gradient -->
        <linearGradient id="finGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#90a4ae"/>
          <stop offset="100%" stop-color="#546e7a"/>
        </linearGradient>
        <!-- Window glow -->
        <radialGradient id="winGrad" cx="50%" cy="40%">
          <stop offset="0%"   stop-color="#e0f7fa"/>
          <stop offset="40%"  stop-color="#4fc3f7"/>
          <stop offset="100%" stop-color="#01579b"/>
        </radialGradient>
        <!-- Engine -->
        <linearGradient id="engGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#546e7a"/>
          <stop offset="100%" stop-color="#263238"/>
        </linearGradient>
        <!-- glow filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- FIN LEFT -->
      <g class="seg seg-fin-l">
        <polygon points="40,310 70,270 70,360 30,380" fill="url(#finGrad)" stroke="#b0bec5" stroke-width="1.2"/>
        <!-- fin detail lines -->
        <line x1="48" y1="355" x2="68" y2="275" stroke="#90a4ae" stroke-width="0.6" opacity="0.6"/>
        <line x1="38" y1="368" x2="68" y2="310" stroke="#90a4ae" stroke-width="0.6" opacity="0.6"/>
      </g>

      <!-- FIN RIGHT -->
      <g class="seg seg-fin-r">
        <polygon points="160,310 130,270 130,360 170,380" fill="url(#finGrad)" stroke="#b0bec5" stroke-width="1.2"/>
        <line x1="152" y1="355" x2="132" y2="275" stroke="#90a4ae" stroke-width="0.6" opacity="0.6"/>
        <line x1="162" y1="368" x2="132" y2="310" stroke="#90a4ae" stroke-width="0.6" opacity="0.6"/>
      </g>

      <!-- BODY -->
      <g class="seg seg-body">
        <!-- Main cylinder -->
        <rect x="68" y="150" width="64" height="220" rx="4" fill="url(#bodyGrad)"/>
        <!-- Horizontal panel seams -->
        <line x1="68" y1="185" x2="132" y2="185" stroke="#90a4ae" stroke-width="0.8" opacity="0.5"/>
        <line x1="68" y1="220" x2="132" y2="220" stroke="#90a4ae" stroke-width="0.8" opacity="0.5"/>
        <line x1="68" y1="310" x2="132" y2="310" stroke="#90a4ae" stroke-width="0.8" opacity="0.5"/>
        <!-- Dark tech panel center -->
        <rect x="76" y="240" width="48" height="60" rx="2" fill="url(#panelGrad)" opacity="0.85"/>
        <!-- Panel grid -->
        <line x1="100" y1="243" x2="100" y2="297" stroke="#4fc3f7" stroke-width="0.5" opacity="0.4"/>
        <line x1="78"  y1="260" x2="122" y2="260" stroke="#4fc3f7" stroke-width="0.5" opacity="0.4"/>
        <line x1="78"  y1="275" x2="122" y2="275" stroke="#4fc3f7" stroke-width="0.5" opacity="0.4"/>
        <!-- Edge lighting -->
        <line x1="68" y1="150" x2="68" y2="370" stroke="#eceff1" stroke-width="1" opacity="0.4"/>
        <line x1="132" y1="150" x2="132" y2="370" stroke="#78909c" stroke-width="1" opacity="0.3"/>
      </g>

      <!-- STRIPE -->
      <g class="seg seg-stripe">
        <rect x="68" y="190" width="64" height="22" fill="#263238" opacity="0.9"/>
        <rect x="68" y="192" width="64" height="3" fill="#4fc3f7" opacity="0.6"/>
        <rect x="68" y="207" width="64" height="3" fill="#4fc3f7" opacity="0.6"/>
        <!-- Text on stripe -->
        <text x="100" y="205" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="6" fill="#4fc3f7" opacity="0.8" letter-spacing="3">SRX-7 ∆</text>
      </g>

      <!-- WINDOW -->
      <g class="seg seg-window" filter="url(#glow)">
        <circle cx="100" cy="175" r="18" fill="#0d1b2a" stroke="#4fc3f7" stroke-width="1.5"/>
        <circle cx="100" cy="175" r="14" fill="url(#winGrad)" opacity="0.9"/>
        <!-- reflection -->
        <ellipse cx="95" cy="170" rx="5" ry="3" fill="white" opacity="0.35" transform="rotate(-20,95,170)"/>
        <!-- outer ring detail -->
        <circle cx="100" cy="175" r="18" fill="none" stroke="#b0bec5" stroke-width="0.5" opacity="0.5"/>
        <circle cx="100" cy="175" r="21" fill="none" stroke="#546e7a" stroke-width="0.7" opacity="0.4"/>
      </g>

      <!-- NOSE CONE -->
      <g class="seg seg-nose">
        <!-- nose cone -->
        <path d="M100,20 C80,50 68,100 68,150 L132,150 C132,100 120,50 100,20Z" fill="url(#noseGrad)"/>
        <!-- tip -->
        <ellipse cx="100" cy="22" rx="3" ry="5" fill="#eceff1"/>
        <!-- seam lines on nose -->
        <path d="M100,20 C90,60 80,110 75,150" stroke="#90a4ae" stroke-width="0.6" fill="none" opacity="0.4"/>
        <path d="M100,20 C110,60 120,110 125,150" stroke="#90a4ae" stroke-width="0.6" fill="none" opacity="0.4"/>
        <!-- nose ring -->
        <rect x="68" y="145" width="64" height="8" rx="2" fill="#78909c"/>
        <rect x="68" y="146" width="64" height="1" fill="#eceff1" opacity="0.5"/>
        <!-- marking -->
        <text x="100" y="140" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="7" fill="#546e7a" opacity="0.7" letter-spacing="1">▲ ORB</text>
      </g>

      <!-- ENGINE -->
      <g class="seg seg-engine">
        <!-- nozzle bell -->
        <path d="M72,370 L68,370 L62,420 L138,420 L132,370 L128,370" fill="url(#engGrad)"/>
        <!-- inner -->
        <path d="M75,370 L68,415 L132,415 L125,370Z" fill="#1a2b35" opacity="0.7"/>
        <!-- nozzle collar -->
        <rect x="68" y="365" width="64" height="8" rx="1" fill="#546e7a"/>
        <rect x="68" y="366" width="64" height="1.5" fill="#90a4ae" opacity="0.5"/>
        <!-- exhaust rings inside nozzle -->
        <ellipse cx="100" cy="410" rx="30" ry="6" fill="none" stroke="#4fc3f7" stroke-width="0.7" opacity="0.3"/>
        <ellipse cx="100" cy="398" rx="22" ry="4" fill="none" stroke="#4fc3f7" stroke-width="0.5" opacity="0.25"/>
      </g>

    </svg>

    <!-- FLAME + EXHAUST -->
    <div id="flame-wrap">
      <div class="flame flame-outer"></div>
      <div class="flame flame-mid"></div>
      <div class="flame flame-inner"></div>
      <!-- particles -->
      <div class="particle" style="--pd:1.1s;--pdelay:0s;  --ps:3px; --px:-10px; --py:90px;"></div>
      <div class="particle" style="--pd:1.3s;--pdelay:0.2s;--ps:5px; --px:8px;   --py:100px;"></div>
      <div class="particle" style="--pd:0.9s;--pdelay:0.5s;--ps:2px; --px:-4px;  --py:75px;"></div>
      <div class="particle" style="--pd:1.5s;--pdelay:0.1s;--ps:4px; --px:14px;  --py:110px;"></div>
      <div class="particle" style="--pd:1.0s;--pdelay:0.7s;--ps:3px; --px:-16px; --py:85px;"></div>
      <div class="particle" style="--pd:1.2s;--pdelay:0.9s;--ps:2px; --px:2px;   --py:70px;"></div>
    </div>

  </div>
</div>

<!-- UI OVERLAY -->
<div id="ui">
  <!-- brand top-left -->
  <div id="brand">
    <div class="logo">rocket</div>
    <div class="sub">// Copyright © 2026<br>Space Division, Inc.<br>All Rights Reserved.</div>
  </div>

  <!-- manifesto top-right -->
  <div id="manifesto">
    <div class="eyebrow">////// Manifesto</div>
    <p>Our mission is to<br>push humanity beyond<br>the edge of the known<br>universe, at the<br>intersection of<br>engineering, AI,<br>and the cosmos.</p>
  </div>

  <!-- sound -->
  <button id="sound-btn" onclick="toggleSound()">
    <span id="sound-icon">🔊</span>
    <span id="sound-label">Sound: On</span>
  </button>

  <!-- coordinates bottom-right -->
  <div id="coords">
    <div id="coord-lat">LAT +00.000°</div>
    <div id="coord-lon">LON +00.000°</div>
    <div id="coord-alt">ALT 420.00 km</div>
  </div>
</div>

<!-- SCANLINES -->
<div id="scan"></div>

<script>
// ── STARS ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 220; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  const o = (Math.random() * 0.5 + 0.2).toFixed(2);
  const d = (Math.random() * 4 + 2).toFixed(1);
  s.style.cssText = `
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    width:${size}px; height:${size}px;
    --o:${o}; --d:${d}s;
    animation-delay:${(Math.random()*5).toFixed(1)}s;
  `;
  starsEl.appendChild(s);
}

// ── INTRO LOADING BAR ──
const bar  = document.getElementById('bar');
const intro = document.getElementById('intro');
let pct = 0;
const load = setInterval(() => {
  pct += Math.random() * 6 + 2;
  bar.style.width = Math.min(pct, 100) + '%';
  if (pct >= 100) {
    clearInterval(load);
    setTimeout(() => intro.classList.add('hide'), 200);
  }
}, 60);

// ── LIVE COORDS ──
let lat = 28.573, lon = -80.648, alt = 420.0;
setInterval(() => {
  lat += (Math.random() - 0.5) * 0.002;
  lon += (Math.random() - 0.5) * 0.004;
  alt += (Math.random() - 0.5) * 0.3;
  document.getElementById('coord-lat').textContent =
    `LAT ${lat >= 0 ? '+' : ''}${lat.toFixed(3)}°`;
  document.getElementById('coord-lon').textContent =
    `LON ${lon >= 0 ? '+' : ''}${lon.toFixed(3)}°`;
  document.getElementById('coord-alt').textContent =
    `ALT ${alt.toFixed(2)} km`;
}, 800);

// ── MOUSE PARALLAX ──
document.addEventListener('mousemove', e => {
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  const dx = (e.clientX - cx) / cx, dy = (e.clientY - cy) / cy;
  document.getElementById('rocket-wrap').style.transform =
    `translateY(0px) rotateX(${-dy * 6}deg) rotateY(${dx * 10}deg)`;
});

// ── SOUND ──
let audioCtx = null, soundOn = true, gainNode = null, oscillators = [];

function buildAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  gainNode = audioCtx.createGain();
  gainNode.gain.value = 0.07;
  gainNode.connect(audioCtx.destination);

  // rumble: layered noise via sawtooth oscillators detuned
  const freqs = [55, 58, 52, 110, 108];
  freqs.forEach(f => {
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.value = f;
    const g = audioCtx.createGain();
    g.gain.value = 0.08;
    o.connect(g);
    g.connect(gainNode);
    o.start();
    oscillators.push(o);
  });
  // high whine
  const whine = audioCtx.createOscillator();
  whine.type = 'sine';
  whine.frequency.value = 820;
  const wg = audioCtx.createGain(); wg.gain.value = 0.02;
  whine.connect(wg); wg.connect(gainNode); whine.start();
  oscillators.push(whine);
}

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('sound-label').textContent = soundOn ? 'Sound: On' : 'Sound: Off';
  document.getElementById('sound-icon').textContent = soundOn ? '🔊' : '🔇';
  if (soundOn) {
    buildAudio();
    if (gainNode) gainNode.gain.value = 0.07;
  } else {
    if (gainNode) gainNode.gain.value = 0;
  }
}

// auto-start sound on first interaction
document.addEventListener('click', () => { if (soundOn) buildAudio(); }, { once: true });
</script>
</body>
</html>
