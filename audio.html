<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur Audio ElevenLabs - Vocabulaire</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 30px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 600px; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 0 auto; }
        h1 { font-size: 24px; color: #2c3e50; text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        input[type="text"], input[type="number"], select, input[type="file"] { width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        #actionBtn { background-color: #2ecc71; margin-top: 10px; }
        #actionBtn:hover { background-color: #27ae60; }
        #status { margin-top: 20px; padding: 15px; background: #e8f4f8; border-left: 5px solid #3498db; border-radius: 4px; max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 13px; white-space: pre-wrap; }
        .warning { color: #c0392b; background: #f9d6d2; padding: 10px; border-radius: 4px; font-size: 14px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Générateur Audio ElevenLabs</h1>
    
    <div class="warning">
        <strong>Attention :</strong> 10 000 crédits ne suffiront pas pour 10 825 mots (comptez environ 1 crédit par lettre). Utilisez l'option "Limite" ci-dessous pour tester par petits lots.
    </div>

    <div class="form-group">
        <label for="apiKey">1. Votre clé API ElevenLabs :</label>
        <input type="text" id="apiKey" placeholder="Entrez votre clé xi-api-key">
    </div>
    
    <div class="form-group">
        <button type="button" id="loadVoicesBtn" onclick="chargerVoix()">Charger les voix disponibles</button>
    </div>

    <div class="form-group">
        <label for="voiceSelect">2. Choisir la voix :</label>
        <select id="voiceSelect" disabled>
            <option>-- Chargez d'abord les voix --</option>
        </select>
    </div>

    <div class="form-group">
        <label for="jsonFile">3. Sélectionner le fichier JSON (vocabulary.json) :</label>
        <input type="file" id="jsonFile" accept=".json">
    </div>

    <div class="form-group">
        <label for="maxWords">4. Nombre maximum de mots à traiter (recommandé: 500 pour tester) :</label>
        <input type="number" id="maxWords" value="100" min="1">
    </div>

    <button type="button" id="actionBtn" onclick="lancerGeneration()" disabled>Lancer la génération & Télécharger le ZIP</button>

    <div id="status">En attente de configuration...</div>
</div>

<script>
    let listeMots = [];

    // Fonction pour afficher les logs à l'écran
    function log(message) {
        const statusDiv = document.getElementById('status');
        statusDiv.innerHTML += message + "\n";
        statusDiv.scrollTop = statusDiv.scrollHeight; // Défilement automatique vers le bas
    }

    // 1. Comment choisir la voix : Cette fonction appelle l'API ElevenLabs pour lister vos voix configurées
    async function chargerVoix() {
        const apiKey = document.getElementById('apiKey').value.trim();
        if (!apiKey) {
            alert("Veuillez entrer votre clé API ElevenLabs.");
            return;
        }

        log("Connexion à ElevenLabs pour récupérer les voix...");
        try {
            const response = await fetch('https://api.elevenlabs.io/v1/voices', {
                method: 'GET',
                headers: { 'xi-api-key': apiKey }
            });

            if (!response.ok) throw new Error(`Erreur HTTP ! Statut : ${response.status}`);

            const data = await response.json();
            const voiceSelect = document.getElementById('voiceSelect');
            voiceSelect.innerHTML = ''; // Réinitialiser le menu déroulant

            // Remplir le menu déroulant avec les voix trouvées sur votre compte
            data.voices.forEach(voice => {
                const option = document.createElement('option');
                option.value = voice.voice_id;
                // Affiche le nom de la voix et ses caractéristiques (ex: accent, genre)
                const accent = voice.labels && voice.labels.accent ? ` - ${voice.labels.accent}` : '';
                option.text = `${voice.name}${accent} (${voice.category})`;
                voiceSelect.appendChild(option);
            });

            voiceSelect.disabled = false;
            document.getElementById('actionBtn').disabled = false;
            log("Succès : Les voix ont été chargées. Choisissez celle que vous voulez dans la liste.");

        } catch (error) {
            log(`Erreur lors du chargement des voix : ${error.message}`);
            alert("Impossible de charger les voix. Vérifiez votre clé API.");
        }
    }

    // Écouteur pour lire le fichier JSON dès qu'il est sélectionné
    document.getElementById('jsonFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                listeMots = JSON.parse(evt.target.result);
                log(`Fichier JSON chargé : ${listeMots.length} mots détectés.`);
            } catch (err) {
                log(`Erreur de lecture du fichier JSON : ${err.message}`);
                alert("Le fichier JSON n'est pas valide.");
            }
        };
        reader.readAsText(file);
    });

    // 2. Génération en masse et création du ZIP
    async function lancerGeneration() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const voiceId = document.getElementById('voiceSelect').value;
        const maxWords = parseInt(document.getElementById('maxWords').value) || 100;

        if (!listeMots || listeMots.length === 0) {
            alert("Veuillez d'abord charger votre fichier vocabulary.json.");
            return;
        }

        // Désactiver le bouton pendant le traitement pour éviter les doubles clics
        document.getElementById('actionBtn').disabled = true;
        log("--- Début de la génération ---");

        const zip = new JSZip();
        // On limite la boucle au nombre maximum choisi pour ne pas griller tous vos crédits d'un coup
        const totalATraiter = Math.min(listeMots.length, maxWords);

        for (let i = 0; i < totalATraiter; i++) {
            const item = listeMots[i];
            const mot = item.word; // On extrait la propriété "word" du JSON

            log(`[${i + 1}/${totalATraiter}] Génération audio pour : "${mot}"...`);

            try {
                const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
                    method: 'POST',
                    headers: {
                        'xi-api-key': apiKey,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: mot,
                        model_id: 'eleven_turbo_v2_5', // Modèle le plus rapide et économique pour l'anglais
                        voice_settings: {
                            stability: 0.5,
                            similarity_boost: 0.75
                        }
                    })
                });

                // Gestion de la limite de taux (Trop de requêtes d'un coup / Erreur 429)
                if (response.status === 429) {
                    log("⚠️ Limite de requêtes atteinte. Pause de 10 secondes avant de réessayer...");
                    await new Promise(resolve => setTimeout(resolve, 10000));
                    i--; // On décrémente pour retenter le même mot
                    continue;
                }

                if (!response.ok) {
                    const errText = await response.text();
                    // Si vous n'avez plus de crédits
                    if (errText.includes("insufficient_credits")) {
                        log("❌ Plus de crédits disponibles sur votre compte ElevenLabs ! Arrêt du processus.");
                        break;
                    }
                    throw new Error(`Erreur API (${response.status}) : ${errText}`);
                }

                // Récupération de l'audio sous forme de Blob (binaire)
                const audioBlob = await response.blob();
                
                // Nettoyage du nom de fichier pour éviter les caractères interdits
                const nomFichierSecurise = mot.replace(/[^a-zA-Z0-9-_]/g, '_');
                
                // Ajout du fichier audio dans le dossier ZIP virtuel
                zip.file(`${nomFichierSecurise}.mp3`, audioBlob);

                // Petite pause de 300ms entre chaque requête pour ménager l'API
                await new Promise(resolve => setTimeout(resolve, 300));

            } catch (error) {
                log(`❌ Erreur pour le mot "${mot}" : ${error.message}`);
                log("Arrêt du processus par sécurité.");
                break;
            }
        }

        // 3. Téléchargement du fichier ZIP généré
        log("Génération terminée ! Compression du fichier ZIP en cours...");
        
        try {
            const content = await zip.generateAsync({ type: "blob" });
            
            // Création d'un lien invisible pour déclencher le téléchargement automatique
            const url = window.URL.createObjectURL(content);
            const a = document.createElement('a');
            a.href = url;
            a.download = `vocabulaire_audio_1_${totalATraiter}.zip`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
            
            log("🎉 Succès ! Le fichier ZIP contenant vos sons a été téléchargé !");
        } catch (zipError) {
            log(`Erreur lors de la création du ZIP : ${zipError.message}`);
        }

        // Réactiver le bouton à la fin
        document.getElementById('actionBtn').disabled = false;
    }
</script>

</body>
</html>
